name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: hometutor
        run: |
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_USERNAME}" ]; then
            echo "HF_TOKEN/HF_USERNAME secrets not configured — skipping deploy."
            exit 0
          fi
          git config user.email "ci@hometutor"
          git config user.name "CI"
          git remote add space "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
          git push --force space HEAD:main
