<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0;background:#0a0a0f;overflow:hidden;}
  iframe{display:block;width:100%;border:0;background:#0a0a0f;}
</style>
</head>
<body>
<iframe id="kg-frame" title="3D Knowledge Graph Hall"></iframe>
<script>
const frame = document.getElementById('kg-frame');
const KG3D_MAX_RAW = 600;

function streamlitMessage(type, data) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, data || {}), '*');
}
function setComponentReady() {
  streamlitMessage('streamlit:componentReady', { apiVersion: 1 });
}
function setFrameHeight(height) {
  streamlitMessage('streamlit:setFrameHeight', { height });
}

/** Streamlit component value (JSON). Selection = string; action = {kind, envelope}. */
function setComponentValueRaw(value) {
  if (value == null) return;
  streamlitMessage('streamlit:setComponentValue', { value: value, dataType: 'json' });
}

function setSelectionValue(conceptId) {
  const v = String(conceptId || '').trim();
  if (!v) return;
  setComponentValueRaw(v);
}

/** Primary action channel: envelope via setComponentValue (works inside component iframe). */
function setActionValue(envelope) {
  if (!envelope || typeof envelope !== 'object') return;
  setComponentValueRaw({
    kind: 'kg3d_action',
    version: 1,
    envelope: envelope,
  });
}

function syncConceptSelection(conceptId) {
  setSelectionValue(conceptId);
}

function b64urlEncodeUtf8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}

function notifyChild(status, detail) {
  try {
    if (!frame.contentWindow) return;
    frame.contentWindow.postMessage({
      type: 'hometutor:kg-action-delivery',
      status: String(status || ''),
      detail: String(detail || ''),
    }, '*');
  } catch (_) { /* ignore */ }
}

/**
 * Deliver action: primary = component value; fallback = _kg3d top URL navigation.
 * URL may fail silently in sandboxed/cross-origin component iframes — that is why
 * setComponentValue is primary (audit P0 live «В конспект» timeout).
 */
function syncKg3dAction(envelope) {
  // 1) Primary: Streamlit component value → host re-run without top.location
  try {
    setActionValue(envelope);
    notifyChild('component_sent', 'action envelope via setComponentValue');
  } catch (err) {
    notifyChild('component_failed', String(err && err.message || err || 'setComponentValue failed'));
  }

  // 2) Fallback/compat: _kg3d query-param full reload (when top.location is readable)
  try {
    const raw = b64urlEncodeUtf8(JSON.stringify(envelope));
    if (!raw) {
      notifyChild('url_skipped', 'empty encode');
      return;
    }
    if (raw.length > KG3D_MAX_RAW) {
      notifyChild('oversized', 'raw length ' + raw.length + ' > ' + KG3D_MAX_RAW);
      return;
    }
    const top = window.top;
    const pu = new URL(top.location.href);
    if (pu.searchParams.get('_kg3d') === raw) {
      notifyChild('url_ok', 'already in URL');
      return;
    }
    pu.searchParams.set('_kg3d', raw);
    top.location.replace(pu.toString());
    notifyChild('url_ok', 'top.location.replace scheduled');
  } catch (err) {
    // Expected in many Streamlit component iframe setups — component channel remains.
    notifyChild('url_failed', String(err && err.message || err || 'top.location unavailable'));
  }
}

function cleanupKg3dParam() {
  try {
    const top = window.top;
    const pu = new URL(top.location.href);
    if (!pu.searchParams.has('_kg3d')) return;
    pu.searchParams.delete('_kg3d');
    top.history.replaceState(top.history.state, '', pu.toString());
  } catch (_) { /* ignore — same sandbox constraint as URL delivery */ }
}

function isValidActionEnvelope(data) {
  if (!data || typeof data !== 'object') return false;
  if (Number(data.version) !== 1) return false;
  if (data.source !== 'kg3d') return false;
  // W2b review + W4c district doors (nav-only product views).
  const allowed = {
    start: 1, collect: 1, review: 1, ask: 1,
    door_quiz: 1, door_flashcards: 1, door_plan: 1, door_konspekt: 1,
  };
  if (!allowed[data.action]) return false;
  const concept = String(data.concept_id || '').trim();
  const eventId = String(data.event_id || '').trim();
  const nonce = String(data.session_nonce || '').trim();
  const ts = Number(data.ts);
  const isDoor = String(data.action || '').startsWith('door_');
  // Doors may use placeholder concept_id when graph empty; still require non-empty id.
  return !!(eventId && nonce && Number.isFinite(ts) && ts > 0 && (isDoor ? true : concept));
}

window.__kg3dSetConcept = syncConceptSelection;

window.addEventListener('message', (event) => {
  const data = event.data || {};
  if (data.type === 'streamlit:render') {
    if (event.source !== window.parent) return;
    const args = data.args || {};
    const height = Number(args.height) || 740;
    frame.style.height = height + 'px';
    frame.srcdoc = String(args.html || '');
    setFrameHeight(height);
    // Strip _kg3d only after host had a chance to consume it on this run.
    cleanupKg3dParam();
    return;
  }
  if (event.source !== frame.contentWindow) return;
  if (data.type === 'hometutor:kg-select' && data.concept) {
    syncConceptSelection(String(data.concept));
    return;
  }
  if (data.type === 'hometutor:kg-action') {
    if (!isValidActionEnvelope(data)) {
      notifyChild('invalid', 'child action envelope rejected by wrapper');
      return;
    }
    syncKg3dAction({
      version: 1,
      source: 'kg3d',
      event_id: String(data.event_id).trim(),
      session_nonce: String(data.session_nonce).trim(),
      concept_id: String(data.concept_id).trim(),
      action: data.action,
      ts: Number(data.ts),
    });
  }
});

setComponentReady();
</script>
</body>
</html>
