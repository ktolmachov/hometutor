# /etc/nginx/sites-available/home-rag
# Replace <your-domain.ru> with your real VPS domain and configure via:
# ln -s /etc/nginx/sites-available/home-rag /etc/nginx/sites-enabled/
# Enable SSL using: certbot --nginx -d <your-domain.ru>

server {
    listen 80;
    server_name <your-domain.ru>;

    # Max upload size for document ingestion (.pdf, .docx files)
    client_max_body_size 50M;

    # Streamlit UI with proper WebSocket support
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # FastAPI REST (prefix /api/ maps to backend root /)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
