# hometutor — Docker-стек (FastAPI + Streamlit)
#
# Данные живут на хосте, контейнер видит их через volume mounts.
# Путь к данным задаётся через HOME_RAG_HOME в .env.
# ⚠️  Без HOME_RAG_HOME fallback = D:/AI/app (НЕ корень репо).
# Задайте HOME_RAG_HOME=. в .env для работы из checkout.
#
# Примеры:
#   HOME_RAG_HOME=. docker compose up --build    # данные в ./data, ./chroma_db, ./logs
#   HOME_RAG_HOME=D:/AI/app docker compose up    # данные в D:\AI\app\{data,chroma_db,logs}
#
# С LM Studio / llama.cpp:
#   docker compose -f docker-compose.yml -f docker-compose.lmstudio.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.llamacpp.yml up --build

services:
  hometutor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"   # FastAPI  → http://127.0.0.1:8000/docs
      - "127.0.0.1:8501:8501"   # Streamlit → http://127.0.0.1:8501
    volumes:
      - ${HOME_RAG_HOME:-D:/AI/app}/data:/app/data               # документы + user_state.db
      - ${HOME_RAG_HOME:-D:/AI/app}/chroma_db:/app/chroma_db     # векторный + BM25 индекс
      - ${HOME_RAG_HOME:-D:/AI/app}/logs:/app/logs               # метрики, cost-логи
      - ${HOME_RAG_HOME:-D:/AI/app}/.env:/app/.env:ro            # секреты (read-only)
    env_file:
      - path: ${HOME_RAG_HOME:-D:/AI/app}/.env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
