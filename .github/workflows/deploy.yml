name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      # HF отклоняет push сырых бинарных блобов (включая старые PNG/GIF в истории),
      # поэтому пушим НЕ историю main, а один snapshot-коммит её дерева:
      #  - doc/screenshots/ и docs/screenshots/ исключаются (нужны только на GitHub, не в Space);
      #  - demo_chroma_db/ уходит LFS-указателями (см. .gitattributes),
      #    объекты загружаются отдельным `git lfs push`.
      - name: Push snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: hometutor
        run: |
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_USERNAME}" ]; then
            echo "HF_TOKEN/HF_USERNAME secrets not configured — skipping deploy."
            exit 0
          fi
          git config user.email "ci@hometutor"
          git config user.name "CI"
          git lfs install --local
          git lfs pull --include="demo_chroma_db/**"
          git remote add space "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
          export GIT_INDEX_FILE=.git/space-index
          git read-tree 'HEAD^{tree}'
          git rm -r --cached --quiet doc/screenshots || true
          git rm -r --cached --quiet docs/screenshots || true
          TREE=$(git write-tree)
          unset GIT_INDEX_FILE
          COMMIT=$(git commit-tree -m "Deploy hometutor (snapshot of ${GITHUB_SHA})" "${TREE}")
          git lfs push space "${COMMIT}"
          git push --force space "${COMMIT}:refs/heads/main"
