# hometutor — Docker-стек (FastAPI + Streamlit)
#
# Данные и индекс живут на хосте, контейнер видит их через volume mounts.
# Индексацию делать на хосте: cd D:\AI\app && .\.venv\Scripts\python ingest.py
# Контейнер подхватит свежий индекс без перезапуска.
#
# Запуск:
#   docker compose up --build
#   docker compose -f docker-compose.yml -f docker-compose.lmstudio.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.llamacpp.yml up --build

services:
  hometutor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"   # FastAPI  → http://127.0.0.1:8000/docs
      - "127.0.0.1:8501:8501"   # Streamlit → http://127.0.0.1:8501
    volumes:
      # Данные на хосте → контейнер. Индексация на хосте, контейнер читает.
      # По умолчанию — относительно docker-compose.yml (= корень репо).
      # Для деплоя в D:\AI\app\ — заменить ./ на D:\AI\app\
      - ./data:/app/data               # документы + user_state.db + кэш
      - ./chroma_db:/app/chroma_db     # векторный + BM25 индекс
      - ./logs:/app/logs               # метрики, cost-логи
      - ./.env:/app/.env:ro            # секреты (read-only)
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
